<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <title>WhitelistWeb</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 268px;
      font-family: "Nunito", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #2A2018;
      background: #FBF3E7;
      padding: 18px;
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .logo {
      width: 34px; height: 34px; flex: none;
      border-radius: 11px;
      background: linear-gradient(150deg, #F2683C, #E0673C);
      transform: rotate(-6deg);
      display: grid; place-items: center;
      color: #fff; font-family: "Baloo 2", sans-serif; font-weight: 800; font-size: 14px;
    }
    .brand h1 { font-family: "Baloo 2", sans-serif; font-size: 17px; font-weight: 800; }
    .status {
      margin: 16px 0 4px;
      padding: 16px;
      background: #fff;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 6px 18px rgba(60, 38, 20, .10);
    }
    .count { font-family: "Baloo 2", sans-serif; font-size: 34px; font-weight: 800; color: #F2683C; line-height: 1; }
    .status p { font-weight: 600; font-size: 13px; color: #8A7A6A; margin-top: 6px; }
    #nopw { font-weight: 700; font-size: 12px; color: #E0673C; margin-top: 10px; text-align: center; }
    button {
      margin-top: 14px;
      width: 100%;
      font-family: "Baloo 2", sans-serif;
      font-size: 15px;
      font-weight: 700;
      padding: 12px;
      border: none;
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(150deg, #F2683C, #E0673C);
      box-shadow: 0 6px 16px rgba(224, 103, 60, .34);
      cursor: pointer;
    }
    button:hover { filter: brightness(1.04); }
    button:active { transform: scale(0.99); }
    a {
      display: block;
      margin-top: 12px;
      text-align: center;
      font-family: "Baloo 2", sans-serif;
      font-weight: 600;
      font-size: 13px;
      color: #C0562E;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
    .breakdown { font-weight: 700; font-size: 12px; color: #B89A82; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="brand">
    <div class="logo">212</div>
    <h1>WhitelistWeb</h1>
  </div>

  <div class="status">
    <div class="count" id="count">0</div>
    <p><span id="word">sites are</span> unlocked</p>
    <p class="breakdown" id="breakdown"></p>
  </div>

  <p id="nopw" hidden>No password set yet — open Settings to create one.</p>

  <button id="lock">Lock everything now</button>
  <a href="#" id="opts">Settings &amp; password</a>

  <script src="popup.js"></script>
</body>
</html>
