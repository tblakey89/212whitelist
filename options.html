<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WhitelistWeb — Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Nunito", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #2A2018;
      background: #FBF3E7; /* Cream */
      padding: 48px 20px;
    }
    .wrap {
      max-width: 480px;
      margin: 0 auto;
      background: #fff;
      border-radius: 22px;
      padding: 34px 34px 30px;
      box-shadow: 0 6px 18px rgba(60, 38, 20, .10);
    }
    .brand { display: flex; align-items: center; gap: 14px; margin-bottom: 6px; }
    .logo {
      width: 52px; height: 52px; flex: none;
      border-radius: 16px;
      background: linear-gradient(150deg, #F2683C, #E0673C);
      transform: rotate(-6deg);
      display: grid; place-items: center;
      color: #fff; font-family: "Baloo 2", sans-serif; font-weight: 800; font-size: 20px;
      box-shadow: 0 8px 20px rgba(224, 103, 60, .35);
    }
    h1 { font-family: "Baloo 2", sans-serif; font-size: 26px; font-weight: 800; letter-spacing: -.01em; }
    .tagline { color: #8A7A6A; font-size: 15px; font-weight: 600; margin-bottom: 28px; }
    h2 { font-family: "Baloo 2", sans-serif; font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    p.help { color: #8A7A6A; font-size: 14.5px; font-weight: 600; margin-bottom: 18px; line-height: 1.5; text-wrap: pretty; }
    label { display: block; font-family: "Baloo 2", sans-serif; font-size: 14px; font-weight: 600; color: #8A7A6A; margin: 16px 0 6px; }
    input {
      width: 100%;
      font-family: "Nunito", sans-serif;
      font-weight: 700;
      font-size: 16px;
      padding: 14px 16px;
      border: 2px solid #F0E6D6;
      border-radius: 14px;
      outline: none;
      background: #FFFDFA;
      color: #2A2018;
      transition: border-color .15s ease, box-shadow .15s ease;
    }
    input::placeholder { color: #A89684; font-weight: 600; }
    input:focus { border-color: #F2683C; box-shadow: 0 0 0 4px rgba(242, 104, 60, .16); }
    button {
      margin-top: 24px;
      width: 100%;
      font-family: "Baloo 2", sans-serif;
      font-size: 18px;
      font-weight: 700;
      padding: 15px;
      border: none;
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(150deg, #F2683C, #E0673C);
      box-shadow: 0 8px 22px rgba(224, 103, 60, .38);
      cursor: pointer;
      transition: filter .15s ease, transform .08s ease;
    }
    button:hover { filter: brightness(1.04); }
    button:active { transform: scale(0.99); }
    .msg { margin-top: 18px; font-weight: 700; font-size: 14.5px; min-height: 20px; }
    .msg.ok { color: #1C9B8E; }
    .msg.err { color: #C0392B; }
    section[hidden] { display: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <div class="logo">212</div>
      <h1>WhitelistWeb</h1>
    </div>
    <p class="tagline">Every site stays locked until you type the password.</p>

    <section id="setup" hidden>
      <h2>Set your password</h2>
      <p class="help">This password unlocks sites for your child. Pick something they won't guess. It's stored only as a one-way hash — never as plain text.</p>
      <label for="new1">New password</label>
      <input id="new1" type="password" autocomplete="new-password" placeholder="At least 4 characters">
      <label for="new2">Confirm password</label>
      <input id="new2" type="password" autocomplete="new-password" placeholder="Type it again">
      <button id="saveNew">Save password</button>
    </section>

    <section id="change" hidden>
      <h2>Change password</h2>
      <p class="help">Enter your current password, then choose a new one.</p>
      <label for="current">Current password</label>
      <input id="current" type="password" autocomplete="current-password" placeholder="Current password">
      <label for="chg1">New password</label>
      <input id="chg1" type="password" autocomplete="new-password" placeholder="At least 4 characters">
      <label for="chg2">Confirm new password</label>
      <input id="chg2" type="password" autocomplete="new-password" placeholder="Type it again">
      <button id="saveChange">Update password</button>
    </section>

    <p class="msg" id="msg"></p>
  </div>

  <script src="options.js"></script>
</body>
</html>
